<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slotmaschine</title>

<style>
body{
    margin:0;
    background:#1a1a1a;
    color:white;
    font-family:Arial,sans-serif;
    text-align:center;
}

h1{
    margin-top:30px;
}

#slot{
    display:flex;
    justify-content:center;
    gap:30px;
    margin:50px 0;
}

.slot{
    width:180px;
    height:180px;
    background:white;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 0 20px rgba(255,255,255,.25);
}

.slot img{
    width:100%;
    height:100%;
    object-fit:contain;
}

button{
    padding:15px 40px;
    font-size:22px;
    border:none;
    border-radius:12px;
    cursor:pointer;
    background:#2ecc71;
    color:white;
}

button:hover{
    background:#27ae60;
}

button:disabled{
    background:gray;
    cursor:not-allowed;
}
</style>

</head>
<body>

<h1>🎰 Slotmaschine</h1>

<div id="slot">
    <div class="slot"><img id="bild1"></div>
    <div class="slot"><img id="bild2"></div>
    <div class="slot"><img id="bild3"></div>
</div>

<button id="spin" onclick="drehen()">🎲 Drehen</button>

<script>

function zufall(){
    return Math.floor(Math.random()*30)+1;
}

async function drehen(){

    const button=document.getElementById("spin");
    button.disabled=true;

    const bilder=[
        document.getElementById("bild1"),
        document.getElementById("bild2"),
        document.getElementById("bild3")
    ];

    // Slot-Effekt
    for(let i=0;i<25;i++){

        bilder.forEach(img=>{
            img.src="bilder/"+zufall()+".png";
        });

        await new Promise(r=>setTimeout(r,80));
    }

    // 3 verschiedene Endbilder
    let zahlen=[];

    while(zahlen.length<3){
        let z=zufall();
        if(!zahlen.includes(z)){
            zahlen.push(z);
        }
    }

    bilder[0].src="bilder/"+zahlen[0]+".png";

    await new Promise(r=>setTimeout(r,250));

    bilder[1].src="bilder/"+zahlen[1]+".png";

    await new Promise(r=>setTimeout(r,250));

    bilder[2].src="bilder/"+zahlen[2]+".png";

    button.disabled=false;
}

drehen();

</script>

</body>
</html>
